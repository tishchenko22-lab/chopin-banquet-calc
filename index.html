<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Бенкетів Шопена</title>
    <link rel="stylesheet" href="styles/main.css">
    <script>
        function addToShoppingList(item) {
            const list = document.getElementById('shopping-list');
            const listItem = document.createElement('tr');
            listItem.innerHTML = `<td>${item}</td>`;
            list.appendChild(listItem);
        }
        function onSubmit() {
            const input = document.getElementById('menu-item');
            addToShoppingList(input.value);
            input.value = '';
        }
    </script>
</head>
<body>
    <header>
        <h1>Калькулятор Бенкетів Шопена</h1>
    </header>
    <main>
        <div class="grid-container">
            <aside class="sidebar-left">
                <h2>Меню</h2>
                <input type="text" id="menu-item" placeholder="Додати еле��ент до меню">
                <button onclick="onSubmit()">Добавити до списку покупок</button>
            </aside>
            <section class="content-right">
                <h2>Список покупок</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Назва елемента</th>
                        </tr>
                    </thead>
                    <tbody id="shopping-list">
                        <!-- Список буде заповнений тут -->
                    </tbody>
                </table>
            </section>
        </div>
    </main>
</body>
</html>
